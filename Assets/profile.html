<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/prof-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <title>Profile</title>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-img animate__animated animate__fadeInDown">
                <i class="icons fa-solid fa-user"></i>
            </div>
            <div class="profile-info animate__animated animate__fadeInUp">
                <h1>Fizryan</h1>
                <p>Student</p>
                <p>He's too lazy to describe himself</p>
                <div class="social-icons">
                    <a href="#" class="animate__animated animate__bounceIn" onclick="redirInstagram()"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="animate__animated animate__bounceIn" onclick="redirDiscord()"><i class="fab fa-discord"></i></a>
                    <a href="#" class="animate__animated animate__bounceIn" onclick="redirEmail()"><i class="fas fa-envelope"></i></a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/javascript.js"></script>
</body>
</html>
